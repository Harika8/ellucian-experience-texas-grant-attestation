<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: "Noto Sans", -apple-system, sans-serif;
    background: #f4f3f8;
    display: flex; align-items: center;
    padding: 64px;
    gap: 56px;
  }
  .left { flex: 1 1 56%; }
  .eyebrow { color: #534AB7; font-weight: 700; font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 18px; }
  h1 { font-size: 60px; line-height: 1.05; font-weight: 700; color: #26215C; margin-bottom: 22px; }
  .desc { font-size: 24px; line-height: 1.5; color: #444441; margin-bottom: 34px; max-width: 560px; }
  .tags { display: flex; flex-wrap: wrap; gap: 12px; }
  .tag { font-size: 19px; font-weight: 500; color: #3C3489; background: #EEEDFE; border: 1px solid #CECBF6; border-radius: 999px; padding: 8px 18px; }
  .right { flex: 0 0 auto; width: 460px; display: flex; justify-content: center; }
  .right img { width: 460px; height: auto; border-radius: 16px; box-shadow: 0 18px 50px rgba(38,33,92,0.22); border: 1px solid rgba(0,0,0,0.08); }
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow">Ellucian Experience Card</div>
    <h1>Texas Grant<br/>Attestation</h1>
    <p class="desc">Records a student financial-aid attestation to Banner through Ethos Integration &amp; a Data Connect pipeline.</p>
    <div class="tags">
      <span class="tag">React 19</span>
      <span class="tag">Ellucian Design System</span>
      <span class="tag">Ethos</span>
      <span class="tag">Data Connect</span>
      <span class="tag">Banner</span>
    </div>
  </div>
  <div class="right">
    <img src="standalone/card-form.png" alt="Attestation card" />
  </div>
</body>
</html>
